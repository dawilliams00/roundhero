services:
  - type: web
    name: roundhero-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn "app:create_app()" --bind 0.0.0.0:$PORT
    envVars:
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: roundhero-db
          property: connectionString
databases:
  - name: roundhero-db
    plan: free
